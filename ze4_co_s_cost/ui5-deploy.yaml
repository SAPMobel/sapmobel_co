# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "4.0"
metadata:
  name: ze4.co.s.cost.ze4coscost
type: application
builder:
  resources:
    excludes:
      - /test/**
      - /localService/**
  customTasks:
    - name: deploy-to-abap
      afterTask: generateCachebusterInfo
      configuration:
        target:
          url: http://bgissap3.bgissap.co.kr:8000/
          client: '100'
        app:
          name: E4_S_COST
          description: '[CO] Standard Cost'
          package: ZPE4CO
          transport: EFXK901670
        exclude:
          - /test/


